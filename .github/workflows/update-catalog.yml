name: Update Intune Settings Catalog

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:      # Manual trigger

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Build fetch-catalog tool
        run: |
          go mod download
          go build -o fetch-catalog ./cmd/fetch-catalog

      - name: Fetch latest catalog from Microsoft Graph
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          ./fetch-catalog \
            -tenant "$AZURE_TENANT_ID" \
            -client "$AZURE_CLIENT_ID" \
            -secret "$AZURE_CLIENT_SECRET" \
            -platform macOS \
            -output catalog-data

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet catalog-data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in catalog data"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in catalog data"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update Intune Settings Catalog data"
          title: "Update Intune Settings Catalog"
          body: |
            ## Automated Catalog Update
            
            This PR updates the Intune Settings Catalog data fetched from Microsoft Graph API.
            
            ### Changes
            - Updated `IntuneSettingsCatalog_macOS.json`
            - Updated `IntuneSettingsCategories_macOS.json`
            - Updated `IntuneSettingsVersion.json`
            
            ### Review Checklist
            - [ ] Verify catalog version date is current
            - [ ] Run tests to ensure compatibility
            - [ ] Check for any breaking changes in settings structure
            
            **Auto-generated by GitHub Actions**
          branch: update-catalog
          delete-branch: true
          labels: |
            automated
            catalog-update
